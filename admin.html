<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>망고하다 어드민</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: 'Pretendard', sans-serif; box-sizing: border-box; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #F3F4F6; }
    ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 4px; }
    html, body { height: 100%; background: #F7F7F5; }
    .sidebar-nav { display:flex; align-items:center; gap:10px; width:100%; padding:10px 12px; border-radius:12px; font-size:14px; font-weight:700; color:#9CA3AF; background:transparent; border:none; cursor:pointer; transition:all 0.15s; text-align:left; }
    .sidebar-nav:hover { background:#F9FAFB; color:#1A1A1A; }
    .sidebar-nav.active { background:#FFFBF0; color:#F5A623; }
    .stat-card { background:white; border-radius:20px; padding:24px; border:1.5px solid #F3F4F6; cursor:pointer; transition:all 0.15s; }
    .stat-card:hover { border-color: rgba(245,166,35,0.4); box-shadow: 0 4px 20px rgba(245,166,35,0.1); }
    .badge-pending   { background:#FEF3C7; color:#D97706; }
    .badge-confirmed { background:#D1FAE5; color:#059669; }
    .badge-done      { background:#E0E7FF; color:#4338CA; }
  </style>
</head>
<body>

<!-- ── 로그인 화면 ── -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center bg-[#1A1A1A]">
  <div class="bg-white rounded-3xl p-10 w-full max-w-sm shadow-2xl">
    <div class="text-center mb-8">
      <img src="logo.png" alt="망고하다" class="h-14 w-auto mx-auto mb-4">
      <p class="text-xs font-bold text-gray-400 tracking-widest uppercase">Admin Console</p>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1.5">아이디</label>
        <input id="adminId" type="text" placeholder="admin"
          class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-sm font-medium outline-none focus:border-[#F5A623] focus:bg-white transition-all">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1.5">비밀번호</label>
        <input id="adminPw" type="password" placeholder="••••••••"
          class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-sm font-medium outline-none focus:border-[#F5A623] focus:bg-white transition-all"
          onkeydown="if(event.key==='Enter') adminLogin()">
      </div>
      <p id="loginErr" class="text-xs text-red-400 hidden"></p>
      <button onclick="adminLogin()" id="loginBtn"
        class="w-full py-3.5 bg-[#F5A623] text-white font-bold rounded-xl hover:bg-[#E09318] transition-all">
        로그인
      </button>
    </div>
  </div>
</div>

<!-- ── 어드민 앱 화면 ── -->
<div id="adminApp" class="hidden flex min-h-screen">

  <!-- 사이드바 -->
  <aside class="w-56 flex-shrink-0 h-screen sticky top-0 bg-white border-r border-gray-100 flex flex-col justify-between p-4">
    <div>
      <div class="px-2 mb-6">
        <img src="logo.png" alt="망고하다" class="h-10 w-auto">
        <p class="text-[10px] text-gray-400 font-bold mt-1 tracking-widest uppercase">Admin Console</p>
      </div>
      <nav class="space-y-1">
        <button onclick="showSection('dashboard')" id="nav-dashboard" class="sidebar-nav active">
          <iconify-icon icon="solar:chart-2-bold" width="18"></iconify-icon>
          대시보드
        </button>
        <button onclick="showSection('wills')" id="nav-wills" class="sidebar-nav">
          <iconify-icon icon="solar:document-text-linear" width="18"></iconify-icon>
          유언 작성
        </button>
        <button onclick="showSection('happiness')" id="nav-happiness" class="sidebar-nav">
          <iconify-icon icon="solar:heart-shine-linear" width="18"></iconify-icon>
          행복저금
        </button>
        <button onclick="showSection('consultations')" id="nav-consultations" class="sidebar-nav">
          <iconify-icon icon="solar:chat-round-line-linear" width="18"></iconify-icon>
          상담 신청
        </button>
        <button onclick="showSection('articles')" id="nav-articles" class="sidebar-nav">
          <iconify-icon icon="solar:book-2-linear" width="18"></iconify-icon>
          아티클 관리
        </button>
        <button onclick="showSection('users')" id="nav-users" class="sidebar-nav">
          <iconify-icon icon="solar:users-group-rounded-linear" width="18"></iconify-icon>
          회원 목록
        </button>
      </nav>
    </div>
    <button onclick="adminLogout()" class="sidebar-nav text-gray-400 hover:text-red-400 hover:bg-red-50">
      <iconify-icon icon="solar:logout-2-linear" width="18"></iconify-icon>
      로그아웃
    </button>
  </aside>

  <!-- 메인 -->
  <main class="flex-1 overflow-y-auto p-10">

    <!-- 대시보드 -->
    <div id="sec-dashboard">
      <h2 class="text-2xl font-black text-[#1A1A1A] mb-1">대시보드</h2>
      <p class="text-sm text-gray-400 mb-8">망고하다 서비스 현황</p>

      <div class="grid grid-cols-4 gap-4 mb-10">
        <div class="stat-card" onclick="showSection('users')">
          <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center mb-3">
            <iconify-icon icon="solar:users-group-rounded-bold" width="20" class="text-blue-400"></iconify-icon>
          </div>
          <p class="text-3xl font-black text-[#1A1A1A]" id="statUsers">-</p>
          <p class="text-xs text-gray-400 font-medium mt-1">총 회원수</p>
        </div>
        <div class="stat-card" onclick="showSection('consultations')">
          <div class="w-10 h-10 bg-orange-50 rounded-xl flex items-center justify-center mb-3">
            <iconify-icon icon="solar:chat-round-line-bold" width="20" class="text-orange-400"></iconify-icon>
          </div>
          <p class="text-3xl font-black text-[#1A1A1A]" id="statConsult">-</p>
          <p class="text-xs text-gray-400 font-medium mt-1">상담 신청</p>
        </div>
        <div class="stat-card" onclick="showSection('happiness')">
          <div class="w-10 h-10 bg-[#FFF8EC] rounded-xl flex items-center justify-center mb-3">
            <iconify-icon icon="solar:heart-shine-bold" width="20" class="text-[#F5A623]"></iconify-icon>
          </div>
          <p class="text-3xl font-black text-[#1A1A1A]" id="statHappiness">-</p>
          <p class="text-xs text-gray-400 font-medium mt-1">행복저금</p>
        </div>
        <div class="stat-card" onclick="showSection('wills')">
          <div class="w-10 h-10 bg-purple-50 rounded-xl flex items-center justify-center mb-3">
            <iconify-icon icon="solar:document-text-bold" width="20" class="text-purple-400"></iconify-icon>
          </div>
          <p class="text-3xl font-black text-[#1A1A1A]" id="statWills">-</p>
          <p class="text-xs text-gray-400 font-medium mt-1">유언 작성</p>
        </div>
      </div>

      <!-- 최근 상담 신청 -->
      <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
          <h3 class="font-black text-[#1A1A1A]">최근 상담 신청</h3>
          <button onclick="showSection('consultations')" class="text-xs text-[#F5A623] font-bold hover:underline">전체보기 →</button>
        </div>
        <div id="recentConsult"></div>
      </div>
    </div>

    <!-- 유언 작성 -->
    <div id="sec-wills" class="hidden">
      <h2 class="text-2xl font-black text-[#1A1A1A] mb-1">유언 작성</h2>
      <p class="text-sm text-gray-400 mb-8">전체 유언 목록</p>
      <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
        <div id="willTable"></div>
      </div>
    </div>

    <!-- 행복저금 -->
    <div id="sec-happiness" class="hidden">
      <h2 class="text-2xl font-black text-[#1A1A1A] mb-1">행복저금</h2>
      <p class="text-sm text-gray-400 mb-8">전체 행복저금 목록</p>
      <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
        <div id="happinessTable"></div>
      </div>
    </div>

    <!-- 상담 신청 -->
    <div id="sec-consultations" class="hidden">
      <div class="flex items-center justify-between mb-8">
        <div>
          <h2 class="text-2xl font-black text-[#1A1A1A] mb-1">상담 신청</h2>
          <p class="text-sm text-gray-400">전체 상담 신청 목록</p>
        </div>
        <div class="flex gap-2">
          <button onclick="filterConsult('all')"       id="cf-all"       class="px-4 py-2 rounded-xl text-xs font-bold bg-[#1A1A1A] text-white">전체</button>
          <button onclick="filterConsult('pending')"   id="cf-pending"   class="px-4 py-2 rounded-xl text-xs font-bold bg-gray-100 text-gray-500">대기</button>
          <button onclick="filterConsult('confirmed')" id="cf-confirmed" class="px-4 py-2 rounded-xl text-xs font-bold bg-gray-100 text-gray-500">확인</button>
          <button onclick="filterConsult('done')"      id="cf-done"      class="px-4 py-2 rounded-xl text-xs font-bold bg-gray-100 text-gray-500">완료</button>
        </div>
      </div>
      <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
        <div id="consultTable"></div>
      </div>
    </div>

    <!-- 아티클 관리 -->
    <div id="sec-articles" class="hidden">
      <div class="flex items-center justify-between mb-8">
        <div>
          <h2 class="text-2xl font-black text-[#1A1A1A] mb-1">아티클 관리</h2>
          <p class="text-sm text-gray-400">등록된 아티클 목록</p>
        </div>
        <button onclick="openArticleModal()" class="flex items-center gap-2 px-5 py-2.5 bg-[#F5A623] text-white text-sm font-bold rounded-xl hover:bg-[#E09318] transition-all">
          <iconify-icon icon="solar:add-circle-bold" width="16"></iconify-icon>
          등록하기
        </button>
      </div>
      <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
        <div id="articleTable"></div>
      </div>
    </div>

    <!-- 회원 목록 -->
    <div id="sec-users" class="hidden">
      <h2 class="text-2xl font-black text-[#1A1A1A] mb-1">회원 목록</h2>
      <p class="text-sm text-gray-400 mb-8">전체 가입 회원</p>
      <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
        <div id="userTable"></div>
      </div>
    </div>

  </main>
</div>

<!-- ── 유언 상세 모달 ── -->
<div id="willDetailAdminModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
  <div class="bg-white rounded-3xl w-full max-w-xl shadow-2xl flex flex-col" style="max-height:85vh;">
    <div class="flex items-center justify-between px-8 py-5 border-b border-gray-100 flex-shrink-0">
      <div>
        <p id="willDetailType" class="text-xs font-bold text-[#F5A623] uppercase tracking-widest mb-1"></p>
        <h3 id="willDetailTitle" class="text-lg font-black text-[#1A1A1A]"></h3>
      </div>
      <button onclick="closeWillDetailAdmin()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center hover:bg-gray-200 transition-all">
        <iconify-icon icon="solar:close-circle-linear" width="16"></iconify-icon>
      </button>
    </div>
    <div class="px-8 py-6 overflow-y-auto flex-1">
      <p id="willDetailContent" class="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap"></p>
    </div>
    <div class="px-8 py-4 border-t border-gray-100 flex-shrink-0">
      <p id="willDetailDate" class="text-xs text-gray-300"></p>
    </div>
  </div>
</div>

<!-- ── 아티클 모달 ── -->
<div id="articleModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
  <div class="bg-white rounded-3xl w-full max-w-2xl shadow-2xl flex flex-col" style="max-height:90vh;">
    <div class="flex items-center justify-between px-8 py-5 border-b border-gray-100 flex-shrink-0">
      <h3 id="modalTitle" class="text-lg font-black text-[#1A1A1A]">아티클 등록</h3>
      <button onclick="closeArticleModal()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center hover:bg-gray-200 transition-all">
        <iconify-icon icon="solar:close-circle-linear" width="16"></iconify-icon>
      </button>
    </div>
    <div class="px-8 py-6 space-y-5 overflow-y-auto flex-1">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">카테고리</label>
          <select id="articleCategoryInput"
            class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-sm font-medium outline-none focus:border-[#F5A623] focus:bg-white transition-all">
            <option>유언장 작성</option>
            <option>장례 절차</option>
            <option>상속 문제</option>
            <option>웰다잉</option>
            <option>재무계획</option>
            <option>심리치유</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">제목</label>
          <input id="articleTitleInput" type="text" placeholder="아티클 제목"
            class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-sm font-medium outline-none focus:border-[#F5A623] focus:bg-white transition-all">
        </div>
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">미리보기 설명 <span class="text-gray-300 normal-case font-normal">(카드에 표시되는 짧은 설명)</span></label>
        <input id="articleDescInput" type="text" placeholder="한두 줄의 짧은 설명을 입력하세요"
          class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 bg-gray-50 text-sm font-medium outline-none focus:border-[#F5A623] focus:bg-white transition-all">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">본문 블록</label>
        <div id="blockEditor" class="space-y-3 mb-3"></div>
        <div class="flex gap-2">
          <button onclick="addTextBlock()" class="flex items-center gap-2 px-4 py-2 rounded-xl border-2 border-gray-100 text-xs font-bold text-gray-500 hover:border-[#F5A623] hover:text-[#F5A623] transition-all">
            <iconify-icon icon="solar:text-field-linear" width="14"></iconify-icon> 텍스트 추가
          </button>
          <button onclick="addImageBlock()" class="flex items-center gap-2 px-4 py-2 rounded-xl border-2 border-gray-100 text-xs font-bold text-gray-500 hover:border-[#F5A623] hover:text-[#F5A623] transition-all">
            <iconify-icon icon="solar:gallery-add-linear" width="14"></iconify-icon> 이미지 추가
          </button>
        </div>
      </div>
      <p id="articleErr" class="text-xs text-red-400 hidden"></p>
    </div>
    <div class="px-8 py-5 flex gap-3 flex-shrink-0 border-t border-gray-100">
      <button onclick="closeArticleModal()" class="flex-1 py-3 rounded-xl border-2 border-gray-100 text-sm font-bold text-gray-400 hover:bg-gray-50 transition-all">취소</button>
      <button onclick="saveArticle()" id="articleSaveBtn" class="flex-1 py-3 rounded-xl bg-[#F5A623] text-white text-sm font-bold hover:bg-[#E09318] transition-all">저장하기</button>
    </div>
  </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
